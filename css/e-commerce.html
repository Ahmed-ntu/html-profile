<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple E-Commerce</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .product img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #218838;
        }
        .cart {
            margin-top: 30px;
            background: white;
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>My E-Commerce Store</h1>

<div class="products">
    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 1</h3>
        <p>$10</p>
        <button onclick="addToCart('Product 1', 10)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 2</h3>
        <p>$15</p>
        <button onclick="addToCart('Product 2', 15)">Add to Cart</button>
    </div>

    <div class="product">
        <img src="https://via.placeholder.com/200">
        <h3>Product 3</h3>
        <p>$20</p>
        <button onclick="addToCart('Product 3', 20)">Add to Cart</button>
    </div>
</div>

<div class="cart">
    <h2>Shopping Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: $<span id="total">0</span></h3>
</div>

<script>
    let total = 0;

    function addToCart(name, price) {
        const cartItems = document.getElementById("cart-items");
        const li = document.createElement("li");
        li.textContent = `${name} - $${price}`;
        cartItems.appendChild(li);

        total += price;
        document.getElementById("total").textContent = total;
    }
</script>

</body>
</html>
